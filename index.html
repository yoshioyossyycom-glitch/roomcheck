<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>グループホーム空室情報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2FA966;
    --green-deep:#1F8A4F;
    --green-pale:#E4F4EA;
    --orange:#FF8A3B;
    --orange-deep:#F07422;
    --orange-pale:#FFF0E2;
    --bg:#F6F8F2;
    --card:#FFFFFF;
    --textmain:#3A3A3A;
    --textsub:#84887E;
    --red:#E9573F;
    --red-bg:#FDEBE7;
    --line:#ECEEE7;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:"M PLUS Rounded 1c",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--textmain); padding-bottom:90px;
  }
  header{
    background:var(--green); color:#fff; padding:16px 16px 14px;
    position:sticky; top:0; z-index:50;
    border-radius:0 0 20px 20px;
    box-shadow:0 2px 10px rgba(47,169,102,.28);
  }
  header h1{margin:0; font-size:17px; font-weight:800; letter-spacing:.5px;}
  .sub-row{display:flex; align-items:center; justify-content:space-between; margin-top:3px; gap:10px;}
  header .sub{font-size:11px; opacity:.9; display:flex; align-items:center; gap:6px;}
  .refresh-btn{
    font-size:11px; font-weight:700; color:var(--green-deep); background:#fff; border:none;
    border-radius:999px; padding:5px 12px; cursor:pointer; flex-shrink:0;
    box-shadow:0 1px 3px rgba(0,0,0,.12);
    font-family:inherit;
  }
  .refresh-btn:active{ transform:scale(.96); }
  .refresh-btn.spinning{ opacity:.6; }
  .dot{width:7px; height:7px; border-radius:50%; background:#cfe9da; flex-shrink:0;}
  .dot.ok{background:#4A90E2;}
  .dot.busy{background:#FFD27C;}
  .dot.err{background:#E9573F;}

  .tabs{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:#fff;
    border-top:1px solid var(--line); z-index:60; padding-bottom:env(safe-area-inset-bottom);
  }
  .scroll-top-btn{
    position:fixed; right:16px; bottom:calc(74px + env(safe-area-inset-bottom));
    width:44px; height:44px; border-radius:50%; border:none;
    background:var(--orange); color:#fff; font-size:16px; box-shadow:0 3px 10px rgba(240,116,34,.4);
    z-index:70; cursor:pointer;
    opacity:0; pointer-events:none; transform:translateY(8px);
    transition:opacity .2s ease, transform .2s ease;
    font-family:inherit;
  }
  .scroll-top-btn.show{
    opacity:1; pointer-events:auto; transform:translateY(0);
  }
  .tab{
    flex:1; text-align:center; padding:9px 0 7px; font-size:11.5px; color:#A7ABA0;
    display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer;
    user-select:none; font-weight:500;
  }
  .tab .ic{
    font-size:18px; line-height:1;
    padding:4px 16px; border-radius:999px;
    transition:background-color .15s ease;
  }
  .tab.active{color:var(--green-deep); font-weight:800;}
  .tab.active .ic{background:var(--green-pale);}

  .screen{display:none; padding:16px 14px 10px; max-width:560px; margin:0 auto;}
  .screen.active{display:block;}

  /* ---- トップ画面 ---- */
  .company-card{
    background:var(--card); border-radius:var(--radius); margin-bottom:12px;
    box-shadow:0 2px 8px rgba(60,90,60,.07); overflow:hidden;
    border:1px solid var(--line);
  }
  .company-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:15px 16px; cursor:pointer;
  }
  .company-name{font-size:15.5px; font-weight:800; color:var(--green-deep);}
  .company-vacancy{font-size:12px; margin-top:3px; color:var(--textsub); font-weight:500;}
  .company-vacancy b{color:var(--red); font-size:15px; font-weight:800;}
  .company-phone{font-size:11.5px; color:var(--textsub); margin-top:2px;}
  .company-phone a{color:var(--green-deep); text-decoration:none;}
  .company-updated{font-size:10.5px; color:#AEB2A8; margin-top:4px;}
  .contact-label{
    font-size:11px; color:var(--green-deep); font-weight:800; padding:12px 16px 4px;
  }
  .contact-chips{
    display:flex; flex-direction:column; gap:6px;
    padding:0 16px 10px;
  }
  .contact-chip{
    font-size:11px; color:var(--textsub); background:var(--green-pale); border-radius:12px;
    padding:6px 11px; white-space:normal; align-self:flex-start;
  }
  .contact-chip a{color:var(--green-deep); text-decoration:none; font-weight:700;}
  .chevron{transition:transform .25s cubic-bezier(.4,0,.2,1); color:#C4C8BE; font-size:14px;}
  .company-card.open .chevron{transform:rotate(90deg);}
  .home-list{
    border-top:1px solid var(--line); overflow:hidden; max-height:0;
    transition:max-height .3s cubic-bezier(.4,0,.2,1);
    background:#FBFCF8;
  }
  .home-row{
    display:flex; flex-direction:column; gap:6px;
    padding:12px 16px; font-size:13.5px; border-bottom:1px solid var(--line);
  }
  .home-row-top{display:flex; justify-content:space-between; align-items:center;}
  .home-address{
    font-size:11.5px; color:var(--textsub);
  }
  .home-building{
    margin-left:19px; margin-top:-2px;
  }
  .home-notes{
    font-size:11.5px; color:var(--textsub); background:var(--orange-pale); border-radius:10px;
    padding:8px 10px; white-space:pre-wrap; line-height:1.5;
  }
  .home-row:last-child{border-bottom:none;}
  .home-left{display:flex; flex-direction:column; gap:5px; align-items:flex-start;}
  .home-badges{display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
  .gender-badge{
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; color:#fff; flex-shrink:0;
  }
  .gender-male{background:#5B9BEF;}
  .gender-female{background:#F282A6;}
  .gender-any{background:#A98BE0;}
  .type-badge{
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; color:var(--orange-deep);
    background:var(--orange-pale); flex-shrink:0; white-space:nowrap;
  }
  .home-name{font-weight:700; font-size:14.5px;}
  .status-pill{
    font-size:11.5px; padding:3px 10px; border-radius:999px; font-weight:800; white-space:nowrap;
  }
  .status-vacant{background:var(--green-pale); color:var(--green-deep);}
  .status-full{background:var(--red-bg); color:var(--red);}
  .home-count{font-size:11.5px; color:var(--textsub); margin-left:6px; font-weight:500;}

  .empty-msg{text-align:center; color:#A7ABA0; font-size:13px; padding:40px 0; line-height:1.7;}

  .sort-bar{
    display:flex; gap:0; margin-bottom:14px;
    background:#fff; border-radius:999px; padding:4px;
    border:1px solid var(--line);
    box-shadow:0 1px 4px rgba(60,90,60,.06);
  }
  .sort-btn{
    flex:1; padding:8px 0; border-radius:999px; font-size:12.5px; border:none;
    background:transparent; color:#9BA095; cursor:pointer; font-weight:700;
    font-family:inherit;
    transition:background-color .15s ease, color .15s ease;
  }
  .sort-btn.active{
    background:var(--green); color:#fff;
    box-shadow:0 1px 4px rgba(47,169,102,.35);
  }

  /* ---- 掲示板 ---- */
  .board-post{
    background:var(--card); border-radius:var(--radius); padding:15px 16px; margin-bottom:11px;
    box-shadow:0 2px 8px rgba(60,90,60,.07);
    border:1px solid var(--line);
  }
  .board-meta{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; gap:8px;}
  .board-company{font-size:12px; font-weight:800; color:var(--orange-deep); background:var(--orange-pale); padding:3px 10px; border-radius:999px;}
  .board-date{font-size:11px; color:var(--textsub);}
  .board-author-top{font-size:11px; color:var(--textsub); font-weight:500;}
  .board-text{font-size:14px; line-height:1.65; white-space:pre-wrap;}
  .board-date-bottom{font-size:11px; color:#AEB2A8; margin-top:8px; text-align:right;}
  .board-author{font-size:11.5px; color:var(--textsub); margin-top:8px; text-align:right;}

  /* ---- 編集画面 ---- */
  .edit-section{
    background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:14px;
    box-shadow:0 2px 8px rgba(60,90,60,.07);
    border:1px solid var(--line);
  }
  .edit-section h3{margin:0 0 12px; font-size:14px; font-weight:800; color:var(--green-deep); border-bottom:2px solid var(--green-pale); padding-bottom:7px;}
  label{display:block; font-size:12px; color:var(--textsub); margin:10px 0 4px; font-weight:700;}
  input[type=text], input[type=number], input[type=url], select, textarea{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:14px;
    background:#FBFCF8; font-family:inherit; color:var(--textmain);
  }
  input:focus, select:focus, textarea:focus{
    outline:none; border-color:var(--green); background:#fff;
  }
  textarea{resize:vertical; min-height:70px;}
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}

  .btn{
    display:block; width:100%; text-align:center; padding:13px 0; border-radius:999px;
    background:var(--green); color:#fff; font-size:14px; font-weight:800; border:none;
    margin-top:14px; cursor:pointer; font-family:inherit;
    box-shadow:0 2px 6px rgba(47,169,102,.3);
  }
  .btn:active{opacity:.85; transform:scale(.99);}
  .btn-outline{background:#fff; color:var(--green-deep); border:2px solid var(--green); box-shadow:none;}
  .home-edit-item{
    border:1.5px solid var(--line); border-radius:14px; margin-top:12px; position:relative; background:#FBFCF8;
    overflow:hidden;
  }
  .home-edit-item .del-x{
    position:absolute; top:9px; right:11px; color:#C4C8BE; font-size:18px; cursor:pointer; line-height:1; z-index:2;
  }
  .small-gray{font-size:11px; color:#A7ABA0; margin-top:4px;}
  .home-edit-item.draft-item{
    border:2px dashed var(--orange); background:var(--orange-pale); padding:13px;
  }
  .home-edit-item[data-contact-id]{ padding:13px; }
  .home-edit-summary{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:13px 34px 13px 13px; cursor:pointer;
  }
  .home-edit-summary-text{display:flex; flex-direction:column; gap:5px; min-width:0;}
  .home-edit-summary-badges{display:flex; gap:6px; flex-wrap:wrap;}
  .home-edit-summary-name{font-weight:700; font-size:14px; color:var(--textmain); overflow-wrap:anywhere;}
  .home-edit-item .home-chevron-edit{
    margin-left:auto; flex-shrink:0; color:#C4C8BE; font-size:14px;
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  .home-edit-item.open .home-chevron-edit{transform:rotate(90deg);}
  .home-edit-detail{
    display:none; padding:0 13px 13px; border-top:1px solid var(--line);
  }
  .home-edit-item.open .home-edit-detail{display:block; padding-top:13px;}

  .post-edit-row{
    display:flex; justify-content:flex-end; gap:8px; margin-top:10px;
  }
  .icon-btn{
    font-size:12px; font-weight:700; color:var(--green-deep); background:#fff; border:1.5px solid var(--green); border-radius:999px;
    padding:6px 14px; cursor:pointer; font-family:inherit;
  }
  .icon-btn.danger{color:var(--red); border-color:#F3C4BA;}
  .icon-btn-lg{
    font-size:15px; font-weight:800; padding:11px 30px; border-radius:999px;
    background:var(--orange); color:#fff; border:none; font-family:inherit;
    box-shadow:0 2px 6px rgba(240,116,34,.35);
  }
  .icon-btn-lg:active{transform:scale(.97);}

  .company-block{
    padding-top:0; margin-top:16px; overflow:hidden;
    border:none;
  }
  .company-block-title{
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
    padding:12px 2px;
    border-top:2px solid var(--green-pale);
  }
  .company-block-title h3{border:none; margin:0; padding:0;}
  .company-number{
    display:inline-block; min-width:22px; text-align:center;
    color:#fff; background:var(--green); border-radius:999px;
    margin-right:7px; font-weight:800; font-size:12px; padding:2px 7px;
  }
  .section-label{
    font-size:17px; color:#fff; font-weight:800; margin:24px 0 10px; letter-spacing:1px;
    background:var(--orange); padding:11px 14px; border-radius:999px; text-align:center;
    box-shadow:0 2px 8px rgba(240,116,34,.3);
  }
  .company-block-title-right{display:flex; align-items:center; gap:10px;}
  .chevron-edit{
    transition:transform .25s cubic-bezier(.4,0,.2,1); color:#C4C8BE; font-size:14px; flex-shrink:0;
  }
  .company-block.open .chevron-edit{transform:rotate(90deg);}
  .company-edit-body{
    display:none;
  }
  .company-block.open .company-edit-body{
    display:block;
  }
  .company-info-edit{padding-bottom:6px;}
  .collapsible-body{
    overflow:hidden; max-height:0;
    transition:max-height .3s cubic-bezier(.4,0,.2,1);
  }
  .home-list-divider{height:1.5px; background:var(--green-pale); margin:16px 0 4px; border-radius:2px;}

  .setup-banner{
    background:var(--orange-pale); border:1.5px solid #FFD9B8; border-radius:14px; padding:14px; margin-bottom:14px; font-size:12.5px; line-height:1.7;
  }
  .setup-banner b{color:var(--orange-deep);}

  /* モーダル */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(40,60,40,.45); z-index:100;
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{ background:#fff; border-radius:20px; padding:22px; max-width:340px; width:100%; }
  .modal-box p{font-size:14px; line-height:1.6; margin:0 0 16px; font-weight:500;}
  .modal-actions{display:flex; gap:10px;}
  .modal-actions button{ flex:1; padding:11px 0; border-radius:999px; font-size:13.5px; font-weight:700; border:none; cursor:pointer; font-family:inherit; }
  .modal-cancel{background:#EFF1EA; color:#6B6F64;}
  .modal-confirm{background:var(--red); color:#fff;}

  .toast{
    position:fixed; bottom:94px; left:50%; transform:translateX(-50%);
    background:var(--green-deep); color:#fff; padding:10px 20px; border-radius:999px; font-size:13px; font-weight:700;
    z-index:200; opacity:0; transition:opacity .25s; pointer-events:none;
    box-shadow:0 3px 10px rgba(31,138,79,.4);
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>🏡 グループホーム空室情報</h1>
  <div class="sub-row">
    <div class="sub"><span class="dot" id="connDot"></span><span id="headerSub">読み込み中…</span></div>
    <button id="manualRefreshBtn" class="refresh-btn" title="今すぐ更新">⟳ 更新</button>
  </div>
</header>

<div class="screen active" id="screen-top">
  <div class="sort-bar">
    <button class="sort-btn" data-sort="alpha">アルファベット順</button>
    <button class="sort-btn" data-sort="vacancy">空室順</button>
  </div>
  <div id="topList"></div>
</div>

<div class="screen" id="screen-board">
  <div class="edit-section">
    <button class="btn" id="toggleAddPostBtn">＋投稿する</button>
    <div class="collapsible-body" id="addPostBody">
      <label>法人名</label>
      <select id="postCompany"></select>
      <label>担当者名</label>
      <input type="text" id="postAuthor" placeholder="例：吉川">
      <label>本文</label>
      <textarea id="postText" placeholder="皆に伝えたいことを入力"></textarea>
      <button class="btn" id="addPostBtn">投稿する</button>
    </div>
  </div>
  <div id="boardList"></div>
</div>

<div class="screen" id="screen-edit">

  <div class="edit-section">
    <button class="btn" id="toggleAddCompanyBtn">＋法人を追加</button>
    <div class="collapsible-body" id="addCompanyBody">
      <label>法人名</label>
      <input type="text" id="newCompanyName" placeholder="例：会社A">
      <label>代表（問い合わせ先）電話番号</label>
      <input type="text" id="newCompanyPhone" placeholder="例：048-000-0000" inputmode="tel">
      <label>担当者</label>
      <input type="text" id="newCompanyContact" placeholder="例：吉川">
      <button class="btn" id="addCompanyBtn">登録</button>
    </div>
  </div>

  <h3 class="section-label">【法人リスト】</h3>
  <div id="companyEditList"></div>

</div>

<div class="tabs">
  <div class="tab active" data-screen="top"><span class="ic">🏠</span>トップ</div>
  <div class="tab" data-screen="board"><span class="ic">📝</span>一言掲示板</div>
  <div class="tab" data-screen="edit"><span class="ic">⚙️</span>編集</div>
</div>

<button id="scrollTopBtn" class="scroll-top-btn" title="上に戻る">▲</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <p id="modalText">削除しますか？</p>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">キャンセル</button>
      <button class="modal-confirm" id="modalConfirm">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const LOCAL_CACHE_KEY = "gh_vacancy_cache_v1";
  const GAS_URL_KEY = "gh_gas_url";
  // ↓ここにデプロイしたGASの「.../exec」のURLを貼っておくと、
  // 誰がこのページを開いても自動的に接続されます（端末ごとの設定が不要になります）
  const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbxa3x-r1Bnp0QLJbBQ25UtvfXThAnHwX6-6OQtF1ZovJrbzQe4c3gqOy8okJZ2oa3t28w/exec";

  let data = { companies: [], homes: [], posts: [] };
  let openCompanyIds = new Set();
  let openEditCompanyIds = new Set();
  let openEditHomeIds = new Set(); // 編集画面のホーム項目の開閉状態（デフォルト全て閉）
  let openEditPostIds = new Set(); // 編集中の投稿ID
  let draftHomes = []; // 登録ボタンを押すまで保存されない新規ホームの仮データ
  let sortMode = localStorage.getItem("gh_sort_mode") || "alpha";
  const collatorJa = new Intl.Collator("ja");

  // タップ操作でフォーカスが移動し、ブラウザが自動スクロールするより前の
  // スクロール位置を記録しておく（click発火時には既に動いてしまっている事があるため）
  let preTapScrollY = window.scrollY;
  ["touchstart", "pointerdown", "mousedown"].forEach(evt=>{
    document.addEventListener(evt, ()=>{ preTapScrollY = window.scrollY; }, { passive: true, capture: true });
  });

  // 再描画でページが先頭に飛ばないよう、スクロール位置を一定時間しつこく復元する
  function restoreScrollRepeatedly(scrollY){
    const restore = () => {
      if(Math.abs(window.scrollY - scrollY) > 2) window.scrollTo(0, scrollY);
    };
    restore();
    requestAnimationFrame(restore);
    setTimeout(restore, 60);
    setTimeout(restore, 200);
    setTimeout(restore, 400);
  }

  function preserveScroll(renderFn){
    const scrollY = preTapScrollY;
    renderFn();
    restoreScrollRepeatedly(scrollY);
  }

  // 法人ブロックなど、再描画後も存在し続ける要素を基準に
  // 「その要素が画面上の同じ位置に留まる」ようスクロールを補正する。
  // フォーカス移動などブラウザ側の予期しない自動スクロールにも対応できる。
  function preserveScrollAnchoredTo(selector, renderFn){
    const ref = document.querySelector(selector);
    const beforeTop = ref ? ref.getBoundingClientRect().top : null;
    renderFn();
    if(beforeTop === null) return;
    const restore = () => {
      const newRef = document.querySelector(selector);
      if(!newRef) return;
      const diff = newRef.getBoundingClientRect().top - beforeTop;
      if(Math.abs(diff) > 1) window.scrollBy(0, diff);
    };
    restore();
    requestAnimationFrame(restore);
    setTimeout(restore, 60);
    setTimeout(restore, 200);
    setTimeout(restore, 400);
  }

  // ホームの人数・増減を編集保存した時に、その法人の更新日時を記録する
  function touchCompanyUpdated(companyId){
    const company = data.companies.find(c=>c.id === companyId);
    if(!company) return;
    company.updatedAt = Date.now();
    postToGas({action:"updateCompany", id: company.id, name: company.name, phone: company.phone || "", contactPerson: company.contactPerson || "", updatedAt: company.updatedAt, contacts: JSON.stringify(company.contacts || [])});
  }

  function vacancyOf(companyId){
    return data.homes.filter(h=>String(h.companyId) === String(companyId))
      .reduce((s,h)=> s + Math.max(h.capacity - h.count, 0), 0);
  }
  function getSortedCompanies(){
    const list = [...data.companies];
    if(sortMode === "vacancy"){
      list.sort((a,b)=> vacancyOf(b.id) - vacancyOf(a.id));
    } else {
      list.sort((a,b)=> collatorJa.compare(a.name, b.name));
    }
    return list;
  }

  function escapeHtml(str){
    if(str === undefined || str === null) return "";
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }
  function formatDate(ts){

  function parseContactsJson(raw){
    if(Array.isArray(raw)) return raw;

    }catch(e){

  }
  function contactChipHtml(phone, contactPerson){
    if(!phone && !contactPerson) return "";
    const phoneHtml = phone
      ? `<a href="tel:${escapeHtml(String(phone).replace(/[^0-9+]/g,""))}" onclick="event.stopPropagation()">☎ ${escapeHtml(phone)}</a>`
      : "";
    const personHtml = contactPerson ? escapeHtml(contactPerson) : "";
    let inner;
    if(phoneHtml && personHtml) inner = `${phoneHtml}（${personHtml}）`;
    else if(phoneHtml) inner = phoneHtml;

    return `<span class="contact-chip">${inner}</span>`;

  // ---------- JSONP読み込み ----------
  function jsonpFetch(){
    return new Promise((resolve, reject)=>{
      if(!gasUrl){ reject(new Error("GAS URL未設定")); return; }
      const cbName = "__ghCb_" + uid();
      const script = document.createElement("script");
      let done = false;
      const timeout = setTimeout(()=>{
        if(done) return;
        done = true;
        cleanup();
        reject(new Error("timeout"));
      }, 10000);
      function cleanup(){
        clearTimeout(timeout);
        delete window[cbName];
        if(script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = function(result){
        if(done) return;
        done = true;
        cleanup();
        resolve(result);
      };
      const sep = gasUrl.indexOf("?") === -1 ? "?" : "&";
      script.src = gasUrl + sep + "callback=" + cbName + "&t=" + Date.now();
      script.onerror = ()=>{
        if(done) return;
        done = true;
        cleanup();
        reject(new Error("network error"));
      };
      document.body.appendChild(script);
    });
  }

  // ---------- no-cors 書き込み ----------
  function postToGas(payload){
    if(!gasUrl) return Promise.resolve();
    return fetch(gasUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    }).catch(()=>{ /* no-corsなので基本的にここには来ないが念のため */ });
  }

  function refreshFromSheet(silent){
    if(!gasUrl) return Promise.resolve();
    if(!silent) setConnStatus("busy", "更新中…");
    return jsonpFetch().then(result=>{
      data = {
        companies: (result.companies || []).map(c=>({...c, updatedAt: Number(c.updatedAt) || null, contacts: parseContactsJson(c.contacts)})),
        homes: (result.homes || []).map(h=>({...h, capacity:Number(h.capacity)||0, count:Number(h.count)||0})),
        posts: (result.posts || []).map(p=>({...p, timestamp:Number(p.timestamp)||0}))
      };
      const removedOnSync = enforcePostLimit();
      saveLocalCache();
      if(removedOnSync.length > 0){
        removedOnSync.forEach(p=> postToGas({action:"deletePost", id:p.id}));
      }
      setConnStatus("ok", "データベースと連携中");
      renderCurrentScreen();

            <div class="company-info-edit">
              <label>法人名</label>
              <input type="text" data-field="company-name" data-id="${c.id}" value="${escapeHtml(c.name)}">
              <label>代表（問い合わせ先）電話番号</label>
              <input type="text" data-field="company-phone" data-id="${c.id}" value="${escapeHtml(c.phone || "")}" inputmode="tel">
              <label>担当者</label>
              <input type="text" data-field="company-contact" data-id="${c.id}" value="${escapeHtml(c.contactPerson || "")}">
              ${(c.contacts || []).map(ct => `
                <div class="home-edit-item" data-contact-id="${ct.id}">
                  <span class="del-x" data-action="del-contact" data-id="${ct.id}" data-company-id="${c.id}">✕</span>
                  <label>電話番号</label>
                  <input type="text" data-field="contact-phone" data-id="${ct.id}" value="${escapeHtml(ct.phone || "")}" inputmode="tel">
                  <label>担当者</label>
                  <input type="text" data-field="contact-person" data-id="${ct.id}" value="${escapeHtml(ct.contactPerson || "")}">
                </div>
              `).join("")}
              <button class="btn btn-outline" data-action="add-contact" data-id="${c.id}" style="margin-top:10px;">＋連絡先を追加</button>
              <div class="post-edit-row" style="margin-top:14px;">
                <button class="icon-btn" data-action="save-company" data-id="${c.id}">法人情報を保存</button>
              </div>
            </div>
            <div class="home-list-divider"></div>
            ${homesHtml || `<div class="small-gray">まだホームが登録されていません</div>`}
            ${draftsHtml}
            <button class="btn btn-outline" data-action="add-home" data-id="${c.id}">＋ホームを追加</button>
            <button class="icon-btn danger" data-action="del-company" data-id="${c.id}" style="margin-top:14px;">法人を削除</button>
          </div>
        </div>
      `;
    }).join("");
  }

  // ---------- 折りたたみフォームの開閉（汎用） ----------
  function setupCollapsibleToggle(buttonId, bodyId, openLabel, closeLabel){
    const btn = document.getElementById(buttonId);
    const body = document.getElementById(bodyId);
    btn.addEventListener("click", ()=>{
      const opening = !(body.style.maxHeight && body.style.maxHeight !== "0px");
      if(opening){
        body.style.maxHeight = body.scrollHeight + "px";
        btn.textContent = closeLabel;
      } else {
        body.style.maxHeight = "0px";
        btn.textContent = openLabel;
      }
    });
  }
  function collapseForm(buttonId, bodyId, openLabel){
    document.getElementById(bodyId).style.maxHeight = "0px";
    document.getElementById(buttonId).textContent = openLabel;
  }
  setupCollapsibleToggle("toggleAddCompanyBtn", "addCompanyBody", "＋法人を追加", "－閉じる");
  setupCollapsibleToggle("toggleAddPostBtn", "addPostBody", "＋投稿する", "－閉じる");

  // ---------- 法人追加 ----------
  document.getElementById("addCompanyBtn").addEventListener("click", ()=>{
    const input = document.getElementById("newCompanyName");
    const phoneInput = document.getElementById("newCompanyPhone");
    const contactInput = document.getElementById("newCompanyContact");
    const name = input.value.trim();
    const phone = phoneInput.value.trim();
    const contactPerson = contactInput.value.trim();
    if(!name){ showToast("法人名を入力してください"); return; }
    const newCompany = {id: uid(), name, phone, contactPerson, contacts: []};
    data.companies.push(newCompany);
    saveLocalCache();
    input.value = "";
    phoneInput.value = "";
    contactInput.value = "";
    collapseForm("toggleAddCompanyBtn", "addCompanyBody", "＋法人を追加");
    preserveScroll(renderEdit);
    showToast("法人を追加しました");
    postToGas({action:"addCompany", id:newCompany.id, name:newCompany.name, phone:newCompany.phone, contactPerson:newCompany.contactPerson, contacts: "[]"})
      .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
  });

  // 一言掲示板の投稿は最大15件まで。超えた分は古いものから自動的に削除する
  const MAX_BOARD_POSTS = 15;
  function enforcePostLimit(){
    if(data.posts.length <= MAX_BOARD_POSTS) return [];
    const sortedAsc = [...data.posts].sort((a,b)=> a.timestamp - b.timestamp);
    const overflow = sortedAsc.length - MAX_BOARD_POSTS;
    const removed = sortedAsc.slice(0, overflow);
    const removeIds = new Set(removed.map(p=>p.id));
    data.posts = data.posts.filter(p=>!removeIds.has(p.id));
    return removed;
  }

  // ---------- 投稿追加 ----------
  document.getElementById("addPostBtn").addEventListener("click", ()=>{
    const companyId = document.getElementById("postCompany").value;
    const author = document.getElementById("postAuthor").value.trim();
    const text = document.getElementById("postText").value.trim();
    if(!companyId){ showToast("法人を選択してください"); return; }
    if(!text){ showToast("本文を入力してください"); return; }
    const newPost = {id: uid(), companyId, author, text, timestamp: Date.now()};
    data.posts.push(newPost);
    const removed = enforcePostLimit();
    saveLocalCache();
    document.getElementById("postText").value = "";
    collapseForm("toggleAddPostBtn", "addPostBody", "＋投稿する");
    preserveScroll(renderBoard);
    showToast("投稿しました");
    postToGas({action:"addPost", ...newPost})
      .then(()=> Promise.all(removed.map(p=> postToGas({action:"deletePost", id:p.id}))))
      .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
  });

  // ---------- イベント委任（編集画面全体） ----------
  document.getElementById("screen-edit").addEventListener("click", (e)=>{
    const btn = e.target.closest("[data-action]");
    if(!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;

    if(action === "save-company"){
      const block = btn.closest(".company-block");
      const name = block.querySelector("[data-field='company-name']").value.trim();
      const phone = block.querySelector("[data-field='company-phone']").value.trim();
      const contactPerson = block.querySelector("[data-field='company-contact']").value.trim();
      if(!name){ showToast("法人名を入力してください"); return; }
      const company = data.companies.find(c=>c.id === id);
      if(company){
        company.name = name;
        company.phone = phone;
        company.contactPerson = contactPerson;
        // 追加した連絡先の入力内容を現在のDOMから読み取って反映する
        const contactRows = block.querySelectorAll("[data-contact-id]");
        company.contacts = Array.from(contactRows).map(row=>{
          const contactId = row.dataset.contactId;
          return {
            id: contactId,
            phone: row.querySelector("[data-field='contact-phone']").value.trim(),
            contactPerson: row.querySelector("[data-field='contact-person']").value.trim()
          };
        });
        saveLocalCache();
        preserveScrollAnchoredTo(`.company-block[data-company-id="${id}"]`, renderEdit);
        showToast("法人情報を保存しました");
        postToGas({action:"updateCompany", id, name, phone, contactPerson, updatedAt: company.updatedAt || "", contacts: JSON.stringify(company.contacts)})
          .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
      }
      return;
    }

    if(action === "add-contact"){
      const company = data.companies.find(c=>c.id === id);
      if(!company) return;
      if(!company.contacts) company.contacts = [];
      company.contacts.push({ id: uid(), phone: "", contactPerson: "" });
      preserveScrollAnchoredTo(`.company-block[data-company-id="${id}"]`, renderEdit);
      return;
    }

    if(action === "del-contact"){
      const companyId = btn.dataset.companyId;
      const company = data.companies.find(c=>c.id === companyId);
      if(!company) return;
      company.contacts = (company.contacts || []).filter(ct=>ct.id !== id);
      preserveScrollAnchoredTo(`.company-block[data-company-id="${companyId}"]`, renderEdit);
      return;
    }

    if(action === "toggle-company-edit"){
      const block = btn.closest(".company-block");
      const opening = !block.classList.contains("open");
      if(opening){
        openEditCompanyIds.add(id);
        block.classList.add("open");
      } else {
        openEditCompanyIds.delete(id);
        block.classList.remove("open");
      }
      return;
    }

    if(action === "toggle-home-edit"){
      const item = btn.closest(".home-edit-item");
      const opening = !item.classList.contains("open");
      if(opening){
        openEditHomeIds.add(id);
        item.classList.add("open");
      } else {
        openEditHomeIds.delete(id);
        item.classList.remove("open");
      }
      return;
    }

    if(action === "add-home"){
      draftHomes.push({ tempId: uid(), companyId: id, name: "", gender: "male", capacity: 1, count: 0, notes: "", postalCode: "", address: "", homeType: "", buildingName: "" });
      preserveScrollAnchoredTo(`.company-block[data-company-id="${id}"]`, renderEdit);
      return;
    }

    if(action === "confirm-new-home"){
      const item = btn.closest("[data-temp-id]");
      const name = item.querySelector("[data-field='name']").value.trim() || "新しいホーム";
      const gender = item.querySelector("[data-field='gender']").value;
      const homeType = item.querySelector("[data-field='homeType']").value;
      const capacity = Math.max(0, parseInt(item.querySelector("[data-field='capacity']").value, 10) || 0);
      const count = Math.max(0, parseInt(item.querySelector("[data-field='count']").value, 10) || 0);
      const notes = item.querySelector("[data-field='notes']").value.trim();
      const postalCode = item.querySelector("[data-field='postalCode']").value.trim();
      const address = item.querySelector("[data-field='address']").value.trim();
      const buildingName = item.querySelector("[data-field='buildingName']").value.trim();
      const draft = draftHomes.find(d=>d.tempId === id);
      if(!draft) return;
      const newHome = { id: uid(), companyId: draft.companyId, name, gender, capacity, count, notes, postalCode, address, homeType, buildingName };
      data.homes.push(newHome);
      draftHomes = draftHomes.filter(d=>d.tempId !== id);
      openEditHomeIds.add(newHome.id);
      touchCompanyUpdated(draft.companyId);
      saveLocalCache();
      preserveScrollAnchoredTo(`.company-block[data-company-id="${draft.companyId}"]`, ()=>{ renderEdit(); renderTop(); });
      showToast("ホームを登録しました");
      postToGas({action:"addHome", ...newHome})
        .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
      return;
    }

    if(action === "cancel-new-home"){
      const draft = draftHomes.find(d=>d.tempId === id);
      const companyId = draft ? draft.companyId : null;
      draftHomes = draftHomes.filter(d=>d.tempId !== id);
      if(companyId){
        preserveScrollAnchoredTo(`.company-block[data-company-id="${companyId}"]`, renderEdit);
      } else {
        preserveScroll(renderEdit);
      }
      return;
    }

    if(action === "save-home"){
      const item = btn.closest("[data-home-id]");
      const home = data.homes.find(h=>h.id === id);
      if(!home) return;
      home.name = item.querySelector("[data-field='name']").value.trim() || home.name;
      home.gender = item.querySelector("[data-field='gender']").value;
      home.homeType = item.querySelector("[data-field='homeType']").value;
      home.capacity = Math.max(0, parseInt(item.querySelector("[data-field='capacity']").value, 10) || 0);
      home.count = Math.max(0, parseInt(item.querySelector("[data-field='count']").value, 10) || 0);
      home.notes = item.querySelector("[data-field='notes']").value.trim();
      home.postalCode = item.querySelector("[data-field='postalCode']").value.trim();
      home.address = item.querySelector("[data-field='address']").value.trim();
      home.buildingName = item.querySelector("[data-field='buildingName']").value.trim();
      touchCompanyUpdated(home.companyId);
      saveLocalCache();
      preserveScrollAnchoredTo(`.company-block[data-company-id="${home.companyId}"]`, ()=>{ renderEdit(); renderTop(); });
      showToast("保存しました");
      postToGas({action:"updateHome", id: home.id, companyId: home.companyId, name: home.name, gender: home.gender, capacity: home.capacity, count: home.count, notes: home.notes, postalCode: home.postalCode, address: home.address, homeType: home.homeType, buildingName: home.buildingName})
        .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
      return;
    }

    if(action === "del-home"){
      askConfirm("このホームを削除しますか？", ()=>{
        const removedHome = data.homes.find(h=>h.id === id);
        data.homes = data.homes.filter(h=>h.id !== id);
        if(removedHome) touchCompanyUpdated(removedHome.companyId);
        saveLocalCache();
        if(removedHome){
          preserveScrollAnchoredTo(`.company-block[data-company-id="${removedHome.companyId}"]`, renderEdit);
        } else {
          preserveScroll(renderEdit);
        }
        showToast("削除しました");
        postToGas({action:"deleteHome", id})
          .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
      });
      return;
    }

    if(action === "del-company"){
      askConfirm("この法人と、所属するホームをすべて削除しますか？", ()=>{
        data.companies = data.companies.filter(c=>c.id !== id);
        data.homes = data.homes.filter(h=>String(h.companyId) !== String(id));
        saveLocalCache();
        preserveScroll(renderEdit);
        showToast("削除しました");
        postToGas({action:"deleteCompany", id})
          .then(()=> setTimeout(()=>refreshFromSheet(true), 1200));
      });
      return;
    }
  });

  // ※ホーム情報は「保存」「登録」ボタンを押した時にのみ反映されます（自動保存はしません）

  // ---------- 上に戻るボタン ----------
  const scrollTopBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", ()=>{
    scrollTopBtn.classList.toggle("show", window.scrollY > 250);
  }, { passive: true });
  scrollTopBtn.addEventListener("click", ()=>{
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  // ---------- 初期表示 ----------
  loadLocalCache();
  applyGasUrlUiState();
  renderTop();
  if(gasUrl){
    refreshFromSheet(false);
  }
})();
</script>
